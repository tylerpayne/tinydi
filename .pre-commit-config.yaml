repos:
  - repo: local
    hooks:
      - id: sync-readme
        name: Sync README into packages/diny
        language: system
        entry: bash -c 'cp README.md packages/diny/README.md && git add packages/diny/README.md'
        files: ^README\.md$
        pass_filenames: false
      - id: poe-fix
        name: Fix formatting and code
        language: system
        entry: uv run poe fix
        pass_filenames: false
        always_run: true
      - id: poe-check
        name: Check code and types
        language: system
        entry: uv run poe check
        pass_filenames: false
        always_run: true
