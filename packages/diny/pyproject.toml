[project]
name = "diny"
version = "0.1.1.dev0"
description = "Dead simple dependency injection for python."
authors = [{ name = "Tyler Payne" }]
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["diny.py"]
